<div class="file-input-container">
  <input
    #fileInputHidden
    class="file-input-hidden"
    type="file"
    accept="{{accept}}"
    (change)="onSubmit($event)"
  >
  <div
    class="file-input"
    (click)="fileInputHidden.click()"
    (drop)="onDrop($event)"
    (dragover)="onDragover($event)"
  >
    drag and drop or click
  </div>
</div>
